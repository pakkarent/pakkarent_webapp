<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="60%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo card -->
  <g transform="translate(80,180)">
    <rect width="170" height="170" rx="38" fill="#FFFFFF" opacity="0.96"/>
    <text x="85" y="125" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="120" font-weight="900" text-anchor="middle"
          fill="#E64A19" letter-spacing="-2">P</text>
  </g>

  <g transform="translate(290,210)">
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="92" font-weight="900" fill="#FFFFFF" letter-spacing="-2">
      PakkaRent
    </text>
    <text x="0" y="76" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="38" font-weight="600" fill="rgba(255,255,255,0.94)">
      Rent Smarter, Live Better
    </text>
    <text x="0" y="130" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="26" font-weight="400" fill="rgba(255,255,255,0.86)">
      Appliances · Furniture · Baby · Events · Camping
    </text>
  </g>

  <g transform="translate(80,500)">
    <rect width="280" height="64" rx="32" fill="rgba(0,0,0,0.32)"/>
    <text x="140" y="42" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">
      Chennai · Bangalore · Hyderabad
    </text>
  </g>

  <g transform="translate(380,500)">
    <rect width="240" height="64" rx="32" fill="rgba(255,255,255,0.18)"
          stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <text x="120" y="42" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">
      Free Delivery · 24/7
    </text>
  </g>
</svg>
